name: 10-Min News Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20  # 🟢 FIX: Upgrade from 18 to 20
      - run: npm install
      - run: node index.js --news  # 🟢 FIX: Only run news
        env:
          HTC_TURSO_DATABASE_URL: ${{ secrets.HTC_TURSO_DATABASE_URL }}
          HTC_TURSO_AUTH_TOKEN: ${{ secrets.HTC_TURSO_AUTH_TOKEN }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}


